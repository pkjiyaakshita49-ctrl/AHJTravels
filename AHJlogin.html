<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:rgb(239, 233, 233);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background: #fedce8;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#f7b6d4;
color:rgb(0, 0, 0);
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
